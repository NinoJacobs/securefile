name: Java Release Workflow

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  packages: write

concurrency:
  group: pipeline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  workflow-note:
    name: Workflow Scope
    runs-on: ubuntu-latest

    steps:
      - name: Explain workflow scope
        run: |
          echo "Build, test, artifact, container, and deploy stages are real."
          echo "Rollback stages remain simulated."

  build-application:
    name: Build Application
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - workflow-note

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build boot artifact
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar --no-daemon

      - name: Upload boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar-pr
          path: build/libs/*.jar
          if-no-files-found: error

  quality-checks:
    name: Quality Checks
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build-application

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run test suite
        run: |
          chmod +x ./gradlew
          ./gradlew check --no-daemon

  build-container:
    name: Build Container
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - build-application
      - quality-checks

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t securefile:${GITHUB_SHA} .

      - name: Container smoke check
        run: docker run --rm --entrypoint java securefile:${GITHUB_SHA} -version

  build-release-artifact:
    name: Build Release Artifact
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - workflow-note

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test release artifact
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar check --no-daemon

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: boot-jar-release
          path: build/libs/*.jar
          if-no-files-found: error

  build-and-push-container:
    name: Build And Push Container
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build-release-artifact
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Compute image tag
        id: image-tag
        run: |
          image_repo=$(echo "ghcr.io/${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${image_repo}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build Docker image
        run: docker build -t "${{ steps.image-tag.outputs.image_tag }}" .

      - name: Container smoke check
        run: docker run --rm --entrypoint java "${{ steps.image-tag.outputs.image_tag }}" -version

      - name: Push Docker image
        run: docker push "${{ steps.image-tag.outputs.image_tag }}"

  deploy-int:
    name: Deploy Integration
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
    environment:
      name: int
    env:
      IMAGE_TAG: ${{ needs.build-and-push-container.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy integration stack
        run: docker compose -f docker-compose.int.yml up -d --build

      - name: Wait for application readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api-docs >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.int.yml logs app
          docker compose -f docker-compose.int.yml logs postgres
          docker compose -f docker-compose.int.yml logs localstack
          exit 1

      - name: Smoke test login
        run: |
          curl -fsS -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"customer.one","password":"password"}' \
            > login.json

      - name: Smoke test customer statements
        run: |
          ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('login.json'))['accessToken'])")
          curl -fsS http://localhost:8080/api/v1/customers/me/statements \
            -H "Authorization: Bearer ${ACCESS_TOKEN}"

      - name: Tear down integration stack
        if: always()
        run: docker compose -f docker-compose.int.yml down -v

  deploy-qa:
    name: Deploy QA
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
      - deploy-int
    environment:
      name: qa
    env:
      IMAGE_TAG: ${{ needs.build-and-push-container.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy QA stack
        run: docker compose -f docker-compose.int.yml up -d --build

      - name: Wait for application readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api-docs >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.int.yml logs app
          docker compose -f docker-compose.int.yml logs postgres
          docker compose -f docker-compose.int.yml logs localstack
          exit 1

      - name: Smoke test login
        run: |
          curl -fsS -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"customer.one","password":"password"}' \
            > login.json

      - name: Smoke test customer statements
        run: |
          ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('login.json'))['accessToken'])")
          curl -fsS http://localhost:8080/api/v1/customers/me/statements \
            -H "Authorization: Bearer ${ACCESS_TOKEN}"

      - name: Tear down QA stack
        if: always()
        run: docker compose -f docker-compose.int.yml down -v

  deploy-prod:
    name: Deploy Production
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
      - deploy-qa
    environment:
      name: prod
    env:
      IMAGE_TAG: ${{ needs.build-and-push-container.outputs.image_tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Deploy production stack
        run: docker compose -f docker-compose.int.yml up -d --build

      - name: Wait for application readiness
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/api-docs >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.int.yml logs app
          docker compose -f docker-compose.int.yml logs postgres
          docker compose -f docker-compose.int.yml logs localstack
          exit 1

      - name: Smoke test login
        run: |
          curl -fsS -X POST http://localhost:8080/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"customer.one","password":"password"}' \
            > login.json

      - name: Smoke test customer statements
        run: |
          ACCESS_TOKEN=$(python3 -c "import json; print(json.load(open('login.json'))['accessToken'])")
          curl -fsS http://localhost:8080/api/v1/customers/me/statements \
            -H "Authorization: Bearer ${ACCESS_TOKEN}"

      - name: Tear down production stack
        if: always()
        run: docker compose -f docker-compose.int.yml down -v

  rollback-int:
    name: Simulate Rollback Integration
    if: failure() && needs.deploy-int.result == 'failure'
    runs-on: ubuntu-latest
    needs:
      - deploy-int
    environment:
      name: int-rollback

    steps:
      - name: Mock integration rollback flow
        run: |
          echo "rollback-int"
          echo "Simulation only: no real integration infrastructure is changed."
          echo "1. Confirm rollback approval for integration"
          echo "2. Pull the previous stable integration image"
          echo "3. Redeploy the previous stable image"
          echo "4. Wait for readiness and health checks"
          echo "5. Run smoke checks"
          echo "Result: rolled back integration"
          echo "Rollback image tag: previous-stable-int"

  rollback-qa:
    name: Simulate Rollback QA
    if: failure() && needs.deploy-qa.result == 'failure'
    runs-on: ubuntu-latest
    needs:
      - deploy-qa
    environment:
      name: qa-rollback

    steps:
      - name: Mock QA rollback flow
        run: |
          echo "rollback-qa"
          echo "Simulation only: no real QA infrastructure is changed."
          echo "1. Confirm rollback approval for QA"
          echo "2. Pull the previous stable QA image"
          echo "3. Redeploy the previous stable image"
          echo "4. Wait for readiness and health checks"
          echo "5. Run smoke checks"
          echo "Result: rolled back QA"
          echo "Rollback image tag: previous-stable-qa"

  rollback-prod:
    name: Simulate Rollback Production
    if: failure() && needs.deploy-prod.result == 'failure'
    runs-on: ubuntu-latest
    needs:
      - deploy-prod
    environment:
      name: prod-rollback

    steps:
      - name: Mock production rollback flow
        run: |
          echo "rollback-prod"
          echo "Simulation only: no real production infrastructure is changed."
          echo "1. Confirm rollback approval for production"
          echo "2. Pull the previous stable production image"
          echo "3. Redeploy the previous stable image"
          echo "4. Wait for readiness and health checks"
          echo "5. Run smoke checks"
          echo "Result: rolled back production"
          echo "Rollback image tag: previous-stable-prod"
