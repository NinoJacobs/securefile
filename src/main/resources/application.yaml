spring:
  application:
    name: securefile
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: none
  lifecycle:
    timeout-per-shutdown-phase: 20s

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

securefile:
  jwt:
    secret: ${SECUREFILE_JWT_SECRET}
    ttl-minutes: ${SECUREFILE_JWT_TTL_MINUTES:60}
  download-link:
    secret: ${SECUREFILE_DOWNLOAD_LINK_SECRET}
  s3:
    endpoint: ${SECUREFILE_S3_ENDPOINT}
    region: ${SECUREFILE_S3_REGION}
    bucket: ${SECUREFILE_S3_BUCKET}
    access-key: ${SECUREFILE_S3_ACCESS_KEY}
    secret-key: ${SECUREFILE_S3_SECRET_KEY}
    path-style-access-enabled: ${SECUREFILE_S3_PATH_STYLE_ACCESS_ENABLED:true}
