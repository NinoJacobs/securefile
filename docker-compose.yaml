services:
  app:
    build: .
    container_name: securefile-app
    depends_on:
      - postgres
      - localstack
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/securefile
      DB_USERNAME: admin
      DB_PASSWORD: admin
      SECUREFILE_JWT_SECRET: local-dev-jwt-secret-change-me
      SECUREFILE_JWT_TTL_MINUTES: "5"
      SECUREFILE_JWT_REFRESH_SECRET: local-dev-jwt-refresh-secret-change-me
      SECUREFILE_JWT_REFRESH_TTL_MINUTES: "10080"
      SECUREFILE_JWT_ISSUER: securefile-auth-local
      SECUREFILE_JWT_AUDIENCE: securefile-api-local
      SECUREFILE_DOWNLOAD_LINK_SECRET: local-dev-download-link-secret-change-me
      SECUREFILE_S3_ENDPOINT: http://localstack:4566
      SECUREFILE_S3_REGION: us-east-1
      SECUREFILE_S3_BUCKET: securefile-statements
      SECUREFILE_S3_ACCESS_KEY: test
      SECUREFILE_S3_SECRET_KEY: test
      SECUREFILE_S3_PATH_STYLE_ACCESS_ENABLED: "true"
    ports:
      - "8080:8080"

  postgres:
    image: postgres:16
    container_name: securefile-postgres
    environment:
      POSTGRES_DB: securefile
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    volumes:
      - securefile-postgres-data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:4
    container_name: securefile-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: us-east-1
      DEBUG: "1"
      PERSISTENCE: "1"
      SECUREFILE_S3_BUCKET: securefile-statements
    ports:
      - "4566:4566"
    volumes:
      - securefile-localstack-data:/var/lib/localstack
      - ./docker/localstack/init/01-create-bucket.sh:/etc/localstack/init/ready.d/01-create-bucket.sh:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: securefile-prometheus
    depends_on:
      - app
    ports:
      - "8082:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana-oss:latest
    container_name: securefile-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "8083:3000"
    volumes:
      - securefile-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  securefile-postgres-data:
  securefile-localstack-data:
  securefile-grafana-data:
