name: Java Container Workflow

on:
  pull_request:
    branches:
      - master
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - closed
permissions:
  contents: read
  pull-requests: read
  packages: write

concurrency:
  group: pipeline-${{ github.event.pull_request.number || github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-application:
    name: Build Application
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Mock build flow
        run: |
          echo "build-application"
          echo "1. Check out repository"
          echo "2. Set up Java and Gradle"
          echo "3. Compile the application"
          echo "4. Package the boot artifact"
          echo "Result: application build passed"

  quality-checks:
    name: Quality Checks
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs:
      - build-application

    steps:
      - name: Mock quality flow
        run: |
          echo "quality-checks"
          echo "1. Run formatting checks"
          echo "2. Run static analysis"
          echo "3. Run dependency and security checks"
          echo "4. Fail the PR if the quality gate is not met"
          echo "Result: quality checks passed"

  build-container:
    name: Build Container
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    needs:
      - quality-checks

    steps:
      - name: Mock container flow
        run: |
          echo "build-container"
          echo "1. Build the Docker image"
          echo "2. Tag the image with the PR commit SHA"
          echo "3. Run a container smoke check"
          echo "4. Keep the image local to the CI run"
          echo "Result: container build passed"

  build-release-artifact:
    name: Build Release Artifact
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    env:
      SECUREFILE_JWT_SECRET: ${{ secrets.SECUREFILE_JWT_SECRET }}
      SECUREFILE_JWT_REFRESH_SECRET: ${{ secrets.SECUREFILE_JWT_REFRESH_SECRET }}
      SECUREFILE_JWT_ISSUER: ${{ secrets.SECUREFILE_JWT_ISSUER }}
      SECUREFILE_JWT_AUDIENCE: ${{ secrets.SECUREFILE_JWT_AUDIENCE }}
      SECUREFILE_DOWNLOAD_LINK_SECRET: ${{ secrets.SECUREFILE_DOWNLOAD_LINK_SECRET }}

    steps:
      - name: Mock release build flow
        run: |
          echo "build-release-artifact"
          echo "1. Check out the merged commit"
          echo "2. Set up Java and Gradle"
          echo "3. Build the application"
          echo "4. Run unit and integration tests"
          echo "5. Create the release artifact"
          echo "6. Archive build outputs"
          echo "Result: release artifact created"

  build-and-push-container:
    name: Build And Push Container
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs:
      - build-release-artifact
    outputs:
      image_tag: ${{ steps.image-tag.outputs.image_tag }}

    steps:
      - name: Mock promoted image tag
        id: image-tag
        run: echo "image_tag=securefile:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Mock image publish flow
        run: |
          echo "build-and-push-container"
          echo "1. Build the production container image"
          echo "2. Tag the image with the commit SHA"
          echo "3. Tag the image with the branch or release version"
          echo "4. Push the image to the container registry"
          echo "5. Record the promoted image tag"
          echo "Result: deployable image published"
          echo "Promoted image tag: ${{ steps.image-tag.outputs.image_tag }}"

  deploy-int:
    name: Deploy INT - Await Approval
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
    environment:
      name: int

    steps:
      - name: Mock integration deployment flow
        run: |
          echo "deploy-int"
          echo "1. Pull the approved image tag from the registry"
          echo "2. Inject integration environment variables and secrets"
          echo "3. Deploy the image to integration"
          echo "4. Wait for the health endpoint to report ready"
          echo "5. Run service integration checks"
          echo "Result: deployed to integration"
          echo "Image tag: ${{ needs.build-and-push-container.outputs.image_tag }}"

      - name: Force INT deployment failure
        if: vars.FORCE_DEPLOY_FAILURE == 'int'
        run: |
          echo "Forced INT deployment failure requested."
          exit 1

  deploy-qa:
    name: Deploy QA - Await Approval
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
      - deploy-int
    environment:
      name: qa

    steps:
      - name: Mock QA deployment flow
        run: |
          echo "deploy-qa"
          echo "1. Reuse the exact image promoted from integration"
          echo "2. Inject QA environment variables and secrets"
          echo "3. Deploy the image to QA"
          echo "4. Wait for the health endpoint to report ready"
          echo "5. Run regression smoke checks"
          echo "6. Await tester or UAT signoff"
          echo "Result: deployed to QA"
          echo "Image tag: ${{ needs.build-and-push-container.outputs.image_tag }}"

      - name: Force QA deployment failure
        if: vars.FORCE_DEPLOY_FAILURE == 'qa'
        run: |
          echo "Forced QA deployment failure requested."
          exit 1

  deploy-prod:
    name: Deploy PROD - Await Approval
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs:
      - build-and-push-container
      - deploy-qa
    environment:
      name: prod

    steps:
      - name: Mock production deployment flow
        run: |
          echo "deploy-prod"
          echo "1. Confirm the protected production environment approval"
          echo "2. Reuse the exact image promoted from QA"
          echo "3. Inject production environment variables and secrets"
          echo "4. Deploy the image with the production strategy"
          echo "5. Wait for readiness and health checks"
          echo "6. Run production smoke checks"
          echo "7. Announce the release"
          echo "Result: deployed to production"
          echo "Image tag: ${{ needs.build-and-push-container.outputs.image_tag }}"

      - name: Force PROD deployment failure
        if: vars.FORCE_DEPLOY_FAILURE == 'prod'
        run: |
          echo "Forced PROD deployment failure requested."
          exit 1

  rollback-int:
    name: Rollback INT - Await Approval
    if: always() && needs.deploy-int.result == 'failure'
    runs-on: ubuntu-latest
    needs:
      - deploy-int
    environment:
      name: int-rollback

    steps:
      - name: Mock integration rollback flow
        run: |
          echo "rollback-int"
          echo "1. Confirm rollback approval for integration"
          echo "2. Pull the previous stable integration image"
          echo "3. Redeploy the previous stable image"
          echo "4. Wait for readiness and health checks"
          echo "5. Run smoke checks"
          echo "Result: rolled back integration"
          echo "Rollback image tag: previous-stable-int"

  rollback-qa:
    name: Rollback QA - Await Approval
    if: always() && needs.deploy-qa.result == 'failure'
    runs-on: ubuntu-latest
    needs:
      - deploy-qa
    environment:
      name: qa-rollback

    steps:
      - name: Mock QA rollback flow
        run: |
          echo "rollback-qa"
          echo "1. Confirm rollback approval for QA"
          echo "2. Pull the previous stable QA image"
          echo "3. Redeploy the previous stable image"
          echo "4. Wait for readiness and health checks"
          echo "5. Run smoke checks"
          echo "Result: rolled back QA"
          echo "Rollback image tag: previous-stable-qa"

  rollback-prod:
    name: Rollback PROD - Await Approval
    if: always() && needs.deploy-prod.result == 'failure'
    runs-on: ubuntu-latest
    needs:
      - deploy-prod
    environment:
      name: prod-rollback

    steps:
      - name: Mock production rollback flow
        run: |
          echo "rollback-prod"
          echo "1. Confirm rollback approval for production"
          echo "2. Pull the previous stable production image"
          echo "3. Redeploy the previous stable image"
          echo "4. Wait for readiness and health checks"
          echo "5. Run smoke checks"
          echo "Result: rolled back production"
          echo "Rollback image tag: previous-stable-prod"
